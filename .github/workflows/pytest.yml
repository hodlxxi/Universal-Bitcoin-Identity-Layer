name: pytest

on:
  push:
    branches: [ "main", "production" ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -r requirements.txt
          python -m pip install pytest pytest-cov PyJWT

      - name: Run tests
        env:
          APP_VERSION: "1.0.0-beta"
          TESTING: "1"
          FLASK_ENV: "testing"
          DATABASE_URL: "sqlite:///:memory:"
          PYTHONFAULTHANDLER: "1"
        run: |
          timeout 25m python -u - <<'PY'
          import faulthandler
          import os
          import pytest

          faulthandler.dump_traceback_later(20 * 60, repeat=False)
          rc = pytest.main(["-q"])
          print(f"pytest.main returned rc={rc}", flush=True)
          os._exit(rc)
          PY
