name: MCP

on:
  pull_request:
    paths:
      - "packages/hodlxxi_mcp/**"
      - ".github/workflows/mcp.yml"
  push:
    branches:
      - main
    paths:
      - "packages/hodlxxi_mcp/**"
      - ".github/workflows/mcp.yml"

permissions:
  contents: read

jobs:
  package:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: packages/hodlxxi_mcp/pyproject.toml

      - name: Install standalone MCP package
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -e "packages/hodlxxi_mcp[test]"

      - name: Check dependency consistency
        run: python -m pip check

      - name: Compile package
        run: |
          python -m compileall -q \
            packages/hodlxxi_mcp/src/hodlxxi_mcp

      - name: Run package and protocol tests
        run: |
          python -m pytest -q \
            packages/hodlxxi_mcp/tests
