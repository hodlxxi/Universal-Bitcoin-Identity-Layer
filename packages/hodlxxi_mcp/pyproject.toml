[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "hodlxxi-mcp"
version = "0.1.1"
description = "Standalone read-only FastMCP wrapper for HODLXXI public machine-readable surfaces."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "fastmcp==3.4.4",
  "httpx>=0.27,<1",
]

[project.optional-dependencies]
test = [
  "pytest>=8,<9",
  "pytest-asyncio>=0.23,<2",
]

[project.scripts]
hodlxxi-mcp = "hodlxxi_mcp.server:main"
hodlxxi-mcp-http = "hodlxxi_mcp.http_server:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
